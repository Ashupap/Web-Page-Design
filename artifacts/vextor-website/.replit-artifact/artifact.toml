kind = "web"
previewPath = "/"
title = "Vextor - Tech for Vikshit Bharat"
version = "1.0.0"
id = "artifacts/vextor-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22027
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/vextor-website run dev"

[services.env]
PORT = "22027"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/vextor-website", "run", "build"]
publicDir = "artifacts/vextor-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
