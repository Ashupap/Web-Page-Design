<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Vextor | Enterprise-Grade B2B Software for Indian SMEs</title>
    <meta name="description" content="Stop losing hours to manual work. Vextor provides accessible, scalable enterprise software for Indian SMEs. Powering Vikshit Bharat 2047. Start growing today. ✓" />
    <link rel="canonical" href="https://vextor.in/" />
    <!-- Theme color -->
    <meta name="theme-color" content="#0A192F" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Vextor | Enterprise-Grade B2B Software for Indian SMEs" />
    <meta property="og:description" content="Stop losing hours to manual work. Vextor provides accessible, scalable enterprise software for Indian SMEs. Powering Vikshit Bharat 2047. Start growing today. ✓" />
    <meta property="og:url" content="https://vextor.in/" />
    <meta property="og:image" content="https://vextor.in/opengraph.jpg" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" type="image/png" href="/logo.png" />
    
    <!-- JSON-LD Structured Data for Vextor -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Vextor",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Enterprise-grade B2B software powering Vikshit Bharat 2047. Fast, accessible, and scalable tech for Indian SMEs.",
      "url": "https://vextor.in/",
      "image": "https://vextor.in/logo.png",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR"
      }
    }
    </script>
    <!-- Preload LCP Logo image -->
    <link rel="preload" as="image" href="/logo.png" />
    
    <!-- DNS prefetch + preconnect for fonts -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Asynchronous Font Loading (Non-Render Blocking) -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
